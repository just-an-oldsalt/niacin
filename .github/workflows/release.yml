name: Release

# Fires when you push a tag like v1.1 / v1.2.0 — builds the app in Release
# config, zips the .app bundle (using `ditto` so xattrs/resource forks
# survive), and attaches it to the GitHub Release for that tag.
#
# NOTE: this build is currently UNSIGNED and UN-NOTARIZED. Gatekeeper will
# block double-click launch; users must right-click → Open the first time.
# Wire up Developer ID signing + notarization before broad distribution
# (search this file for "TODO: signing" for the hook points).

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build:
    name: Build & publish .app
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build Release
        run: |
          set -o pipefail
          xcodebuild build \
            -project niacin.xcodeproj \
            -scheme niacin \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # TODO: signing — replace the `CODE_SIGN_IDENTITY="-"` above with the
      # Developer ID identity, import the cert from a secret, then run
      # `xcrun notarytool submit` + `xcrun stapler staple` on the .app
      # before zipping.

      - name: Zip the .app bundle
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent niacin.app "niacin-${GITHUB_REF_NAME}.zip"
          shasum -a 256 "niacin-${GITHUB_REF_NAME}.zip" > "niacin-${GITHUB_REF_NAME}.zip.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Build/Products/Release/niacin-*.zip
            build/Build/Products/Release/niacin-*.zip.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
