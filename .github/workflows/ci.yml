name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & unit-test (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project niacin.xcodeproj \
            -scheme niacin \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skip-testing:niacinUITests
